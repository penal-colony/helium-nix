name: Check

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  check:
    runs-on: native
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run checks
        env:
          PATH: /run/current-system/sw/bin:/usr/bin:/bin:/usr/local/bin
        run: |
          set -euo pipefail
          nix flake check --accept-flake-config
